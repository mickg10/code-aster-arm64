name: build-arm64

# Builds the native arm64 code_aster image on a GitHub arm64 runner and,
# on pushes to main, publishes it to GHCR.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # Native arm64 runner — no QEMU, real aarch64 compile.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/code-aster-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:17.4
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        if: github.event_name != 'push'
        run: |
          docker buildx build --platform linux/arm64 --load -t code-aster-arm64 .
          ./test.sh code-aster-arm64
